<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申請承認 - SNK_start</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bb5;
            --bg-color: #f8f9fa;
            --border-color: #eee;
            --text-main: #333;
            --header-bg: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: #fff;
            padding: 20px;
        }

        /* Header Area */
        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
        }

        .logo-dots {
            display: grid;
            grid-template-columns: repeat(3, 7px);
            gap: 2px;
        }

        .logo-dots span {
            width: 7px;
            height: 7px;
            background-color: var(--primary-blue);
        }

        /* Table Area */
        .approval-table-container {
            width: 100%;
            overflow-x: auto;
        }

        .approval-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1100px;
        }

        .approval-table th {
            border-bottom: 1px solid #ccc;
            padding: 10px 8px;
            font-weight: normal;
            color: #666;
            text-align: left;
            background-color: #fff;
        }

        .approval-table td {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 8px;
            color: #333;
        }

        .approval-table tr:hover {
            background-color: #fcfcfc;
        }

        /* Statuses */
        .status-cell {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .row-approved {
            color: #666;
        }

        .row-rejected {
            color: #666;
        }

        .row-pending {
            color: #333;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 4px;
        }

        .btn-action {
            width: 38px;
            height: 24px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
        }

        .btn-approve {
            background-color: #005b8a;
        }

        .btn-reject {
            background-color: #005b8a;
        }

        .btn-approve::before { content: "承認"; }
        .btn-reject::before { content: "否認"; }

        .btn-action:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="page-header">
        <a href="admin.html" class="logo-section">
            <div class="logo-dots">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            申請承認
        </a>
    </header>

    <!-- Table -->
    <div class="approval-table-container">
        <table class="approval-table">
            <thead>
                <tr>
                    <th style="width: 100px;">氏名</th>
                    <th style="width: 140px;">打刻グループ</th>
                    <th style="width: 90px;">申請日</th>
                    <th style="width: 90px;">該当日</th>
                    <th style="width: 100px;">申請区分</th>
                    <th style="width: 80px; text-align: center;">申請<br>開始時刻</th>
                    <th style="width: 80px; text-align: center;">申請<br>終了時刻</th>
                    <th>理由</th>
                    <th style="width: 100px;">承認ステータス</th>
                    <th style="width: 100px;">振替予定日</th>
                    <th style="width: 100px;"></th>
                </tr>
            </thead>
            <tbody>
                <!-- ここに動的に申請データが挿入されます -->
            </tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPendingRequests();
        });

        /**
         * 未承認の申請一覧をロード
         */
        async function loadPendingRequests() {
            const tbody = document.querySelector('.approval-table tbody');
            try {
                // APIからデータを取得 (Admin用の全件取得エンドポイント)
                const requests = await Api.get('/Request/pending-all');
                
                // 表をクリア
                tbody.innerHTML = '';
                
                if (!requests || requests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding: 40px; color: #999;">現在、未対応の申請はありません</td></tr>';
                    return;
                }

                // 日付フォーマット
                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
                };

                // 時刻フォーマット (HH:mm)
                const formatTime = (timeStr) => {
                    if (!timeStr) return '';
                    return timeStr.substring(0, 5); // 09:00:00 -> 09:00
                };

                // データを1行ずつ追加
                requests.forEach(req => {
                    const tr = document.createElement('tr');
                    tr.className = 'row-pending';
                    
                    tr.innerHTML = `
                        <td>${req.employeeName || ''}</td>
                        <td>${req.clockGroup || ''}</td>
                        <td>${formatDate(req.requestDate)}</td>
                        <td>${formatDate(req.targetDate)}</td>
                        <td>${req.type || ''}</td>
                        <td style="text-align: center; font-weight: bold;">${formatTime(req.startTime)}</td>
                        <td style="text-align: center; font-weight: bold;">${formatTime(req.endTime)}</td>
                        <td>${req.reason || ''}</td>
                        <td class="status-cell">${req.status || '未対応'}</td>
                        <td style="font-weight: bold; color: #007bb5;">${formatDate(req.transferDate)}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-action btn-approve" onclick="handleAction(${req.id}, 'approve')"></button>
                                <button class="btn-action btn-reject" onclick="handleAction(${req.id}, 'reject')"></button>
                            </div>
                        </td>
                    `;
                    
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('申請一覧取得失敗:', err);
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; color: red; padding: 20px;">データの読み込みに失敗しました</td></tr>';
            }
        }

        /**
         * 承認・否認ボタンの処理 (デモ版)
         */
        async function handleAction(id, type) {
            const actionLabel = type === 'approve' ? '承認' : '否認';
            if (confirm(`${actionLabel}してもよろしいですか？`)) {
                // TODO: 実際のAPI呼び出し
                alert(`${id}番の申請を${actionLabel}しました。 (現在はデモ動作です)`);
                // 再ロード
                await loadPendingRequests();
            }
        }
    </script>
</body>
</html>
