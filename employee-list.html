<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNK_従業員一覧</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #92c4e0;
            --header-dark-blue: #005b8a;
            --text-main: #333;
            --table-header-bg: #80bcdb; /* slightly darker light-blue for table header */
            --border-color: #ddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .emp-list-header {
            background-color: var(--primary-blue);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--header-dark-blue);
            text-decoration: none;
            margin-right: 40px;
        }

        .logo-dots {
            display: grid;
            grid-template-columns: repeat(3, 7px);
            gap: 2px;
        }

        .logo-dots span {
            width: 7px;
            height: 7px;
            background-color: var(--header-dark-blue);
        }

        .record-count {
            font-size: 0.9rem;
            color: var(--header-dark-blue);
            margin-right: auto; /* Pushes the next items to the right */
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-right: 20px;
        }

        .action-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            color: var(--header-dark-blue);
            cursor: pointer;
            font-weight: bold;
        }

        .action-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-bottom: 2px;
        }

        /* Main Content */
        .emp-list-main {
            flex: 1;
            padding: 0;
            overflow: auto;
            background-color: #fff;
        }

        table.list-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1800px; /* Force wide table for horizontal scrolling if needed */
        }

        .list-table th, .list-table td {
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-table th {
            background-color: var(--table-header-bg);
            color: white;
            font-weight: normal;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-table td {
            color: #333;
            height: 30px;
        }
        
        /* The indicator column */
        .col-indicator {
            width: 30px;
            text-align: center !important;
            padding: 0 !important;
            color: #333;
        }

        .row-active .col-indicator {
            color: #000;
            font-size: 14px;
        }

        .list-table tbody tr:hover {
            background-color: #f0f7fb;
        }

        .text-center { text-align: center !important; }

    </style>
</head>
<body>

    <header class="emp-list-header">
        <a href="admin.html" class="header-logo">
            <div class="logo-dots">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            SNK_従業員一覧
        </a>

        <div class="record-count">
            1 / 563
        </div>
        
        <div class="header-actions">
            <!-- 検索/実行 -->
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>検索/実行</span>
            </div>
            <!-- 全レコード表示 -->
            <div class="action-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>全レコード表示</span>
            </div>
        </div>
    </header>

    <main class="emp-list-main">
        <table class="list-table" id="employeeTable">
            <thead>
                <tr>
                    <th class="col-indicator"></th>
                    <th>社員番号</th>
                    <th>氏名_姓</th>
                    <th>氏名_名</th>
                    <th>入社年月日</th>
                    <th>在籍区分</th>
                    <th>郵便番号</th>
                    <th>住所</th>
                </tr>
            </thead>
            <tbody id="employeeListBody">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadEmployeeList();
        });

        async function loadEmployeeList() {
            const body = document.getElementById('employeeListBody');
            const countEl = document.querySelector('.record-count');
            
            try {
                const response = await fetch('http://localhost:5163/api/Employee/search', {
                    headers: { 'Authorization': `Bearer ${sessionStorage.getItem('jwt_token')}` }
                });
                const employees = await response.json();

                body.innerHTML = '';
                employees.forEach((emp, index) => {
                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.onclick = () => {
                        // マスタ画面へ遷移（社員番号を渡す想定）
                        window.location.href = `employee-master.html?id=${emp.社員番号}`;
                    };
                    
                    const hireDate = emp.入社年月日 ? emp.入社年月日.substring(0, 10).replace(/-/g, '/') : '';
                    
                    tr.innerHTML = `
                        <td class="col-indicator">▶</td>
                        <td>${emp.社員番号 || ''}</td>
                        <td>${emp.氏名_姓 || ''}</td>
                        <td>${emp.氏名_名 || ''}</td>
                        <td>${hireDate}</td>
                        <td><span class="status-badge" style="background-color: ${emp.在籍区分 === '在籍' ? '#4cae4c' : '#f44336'}">${emp.在籍区分 || ''}</span></td>
                        <td>${emp.郵便番号 || ''}</td>
                        <td>${emp.住所 || ''}</td>
                    `;
                    body.appendChild(tr);
                });

                countEl.textContent = `${employees.length} / ${employees.length} レコード`;

            } catch (err) {
                console.error('一覧取得失敗:', err);
                body.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 20px; color: red;">データの取得に失敗しました。APIが起動しているか確認してください。</td></tr>';
            }
        }
    </script>
</body>
</html>
