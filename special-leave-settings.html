<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特別休暇設定 - SNK_start</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bb5;
            --bg-color: #f8f9fa;
            --border-color: #ccc;
            --text-main: #333;
            --btn-confirm: #800000; /* Dark red from screenshot */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            background-color: #fff;
            padding: 10px;
        }

        /* Header Area */
        .page-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
        }

        .logo-dots {
            display: grid;
            grid-template-columns: repeat(3, 7px);
            gap: 2px;
        }

        .logo-dots span {
            width: 7px;
            height: 7px;
            background-color: var(--primary-blue);
        }

        .header-actions {
            display: flex;
            gap: 20px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #007bb5;
        }

        .action-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .action-label {
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Table Area */
        .settings-table-container {
            width: 100%;
            overflow-x: auto;
        }

        .settings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1000px;
        }

        .settings-table th {
            border: 1px solid var(--border-color);
            padding: 8px;
            background-color: #fff;
            color: #666;
            font-weight: normal;
        }

        .settings-table td {
            border: 1px solid var(--border-color);
            padding: 8px;
            vertical-align: middle;
        }

        .row-id { width: 40px; text-align: center; }
        .row-name { width: 220px; }

        .form-input {
            width: 100%;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-size: 0.85rem;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .btn-confirm {
            background-color: var(--btn-confirm);
            color: white;
            padding: 4px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .btn-confirm:hover {
            opacity: 0.9;
        }

        /* Cell Specifics */
        .center { text-align: center; }

    </style>
</head>
